<header class="header">
  <div class="top-bar">
    <h1>Hunter's Monster Info Center</h1>

    <div class="account">
      <button>Login</button>
      <button>Register</button>
      <button>Logout</button>
      <button (click)="toggleAdmin()">Admin</button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="Search monsters..." />
  </div>
</header>

<main class="content">
  <app-monster-list [isAdmin]="isAdmin"></app-monster-list>
</main>
